<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kings Engine | Unified</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-gradient: linear-gradient(135deg, #05070a 0%, #0d1117 100%);
            --card-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --accent-purple: #8a3ffc;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --green: #00ffa3;
            --red: #ff3366;
            --gold: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        .glow-bg {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 63, 252, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 9px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 9px;
            color: var(--text-dim);
            backdrop-filter: blur(5px);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .card.main::before { background: linear-gradient(90deg, var(--gold), var(--accent-purple)); }
        .card.sub::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); }
        
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
        }

        .acc-type {
            font-size: 9px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
            display: block;
        }

        .equity {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .equity .currency {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 1px;
        }

        .stat-box .val {
            font-size: 14px;
            font-weight: 600;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }

        .section-header h2 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .pos-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pos-card.long { border-left: 2px solid var(--green); }
        .pos-card.short { border-left: 2px solid var(--red); }

        .pos-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .coin-meta { flex: 1; }
        .coin-meta h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        
        .price-row {
            display: flex;
            gap: 6px;
            font-size: 10px;
            margin-bottom: 2px;
            align-items: center;
        }
        
        .p-label { color: var(--text-dim); }
        .p-val { font-weight: 600; color: #e0e0e0; }
        
        .trail-active {
            background: rgba(0, 242, 255, 0.05);
            padding: 2px 4px;
            border-radius: 4px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            margin-top: 4px;
        }

        .side-badge { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 700; }
        .side-long { background: rgba(0, 255, 163, 0.1); color: var(--green); }
        .side-short { background: rgba(255, 51, 102, 0.1); color: var(--red); }

        .pos-pnl { text-align: right; }
        .pnl-amt { font-size: 16px; font-weight: 700; }
        .pnl-pct { font-size: 11px; font-weight: 600; margin-top: 2px; }
        .up { color: var(--green); }
        .down { color: var(--red); }

        /* Watchlist Area */
        .watchlist {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255,255,255,0.05);
        }

        .watch-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
        }

        .watch-name { font-weight: 700; color: var(--text-main); }
        .watch-z { font-family: monospace; font-weight: 600; }
        .watch-z.hot-long { color: var(--green); text-shadow: 0 0 5px var(--green); }
        .watch-z.hot-short { color: var(--red); text-shadow: 0 0 5px var(--red); }
        .trend-icon { font-size: 8px; }

        .empty {
            text-align: center;
            padding: 15px;
            color: var(--text-dim);
            font-size: 11px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <header>
        <div class="brand">
            <h1>Kings Terminal</h1>
            <p>Live Engine Status</p>
        </div>
        <div id="status" class="status-pill">Syncing...</div>
    </header>

    <div id="dashboard">
        <div style="text-align: center; padding: 80px; color: var(--text-dim);">Scanning Network...</div>
    </div>

    <script>
        const ACCOUNTS = [
            { id: "main", name: "Kings Unified Engine", address: "0x82C23290b1797a32D1C4510C233f7d6F8E944896", class: "main", port: 5001 }
        ];

        const FMV_IP = "150.95.215.147";

        async function postData(url, data) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) { return null; }
        }

        async function getData(url) {
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (e) { return null; }
        }

        async function updateDashboard() {
            const statusEl = document.getElementById('status');
            const dashboardEl = document.getElementById('dashboard');
            
            try {
                let html = '';
                for (const acc of ACCOUNTS) {
                    const [perp, perpXyz, spot, botStatus] = await Promise.all([
                        postData('https://api.hyperliquid.xyz/info', { type: "clearinghouseState", user: acc.address }),
                        postData('https://api.hyperliquid.xyz/info', { type: "clearinghouseState", user: acc.address, dex: "xyz" }),
                        postData('https://api.hyperliquid.xyz/info', { type: "spotClearinghouseState", user: acc.address }),
                        getData(`status_${acc.id}.json?t=${new Date().getTime()}`) // キャッシュ回避
                    ]);

                    if (!perp && !perpXyz) continue;

                    const accountValue = parseFloat(perp?.marginSummary?.accountValue || 0);
                    const usdc = (spot?.balances || []).find(b => b.coin === 'USDC');
                    const spotUSDC = parseFloat(usdc?.total || 0);
                    const totalEquity = Math.max(accountValue, spotUSDC);
                    const marginUsed = parseFloat(perp?.marginSummary?.totalMarginUsed || 0) + 
                                     parseFloat(perpXyz?.marginSummary?.totalMarginUsed || 0);

                    // Positions
                    const allPositions = [...(perp?.assetPositions || []), ...(perpXyz?.assetPositions || [])]
                        .map(p => p.position)
                        .filter(p => Math.abs(parseFloat(p.szi)) > 0.0001);

                    let posHTML = '';
                    if (allPositions.length === 0) {
                        posHTML = '<div class="empty">Scanning for Opportunities...</div>';
                    } else {
                            allPositions.forEach(pos => {
                            const szi = parseFloat(pos.szi);
                            const pnl = parseFloat(pos.unrealizedPnl || 0);
                            const side = szi > 0 ? "LONG" : "SHORT";
                            const pnlClass = pnl >= 0 ? "up" : "down";
                            const coinRaw = pos.coin;
                            const coin = pos.coin.replace('xyz:', '');
                            
                            // ボットのステータスから追加情報を取得
                            const bPos = (botStatus?.active_positions || {})[coinRaw] || {};
                            const entryP = bPos.entry_p || parseFloat(pos.entryPx || 0);
                            const currP = bPos.curr_p || 0;
                            const tpP = bPos.tp_p || 0;
                            const trailExitP = bPos.trail_exit_p || 0;
                            const hwm = bPos.hwm || 0;
                            const tStart = bPos.trail_start || 0.3;

                            posHTML += `
                                <div class="pos-card ${szi > 0 ? 'long' : 'short'}">
                                    <div class="pos-main">
                                        <div class="coin-meta">
                                            <h3>${coin} <span class="side-badge ${szi > 0 ? 'side-long' : 'side-short'}">${side}</span></h3>
                                            <div class="price-row">
                                                <span class="p-label">Entry:</span> <span class="p-val">$${entryP.toFixed(4)}</span>
                                                ${currP ? `<span class="p-label">Now:</span> <span class="p-val">$${currP.toFixed(4)}</span>` : ''}
                                            </div>
                                            <div class="price-row">
                                                <span class="p-label">Target:</span> <span class="p-val" style="color:var(--accent-cyan)">$${tpP.toFixed(4)}</span>
                                                <span class="p-label" style="margin-left:10px">Stop:</span> <span class="p-val" style="color:var(--red)">$${(bPos.sl_p || 0).toFixed(4)}</span>
                                            </div>
                                            ${hwm >= tStart ? `
                                                <div class="price-row trail-active" style="background: rgba(0, 242, 255, 0.05); padding: 2px 6px; border-radius: 4px; margin-top: 4px;">
                                                    <span class="p-label">🛡️ Trail Exit:</span> <span class="p-val">$${trailExitP.toFixed(4)}</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div class="pos-pnl">
                                            <div class="pnl-amt ${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</div>
                                            <div class="pnl-pct ${pnlClass}">${bPos.roe ? bPos.roe.toFixed(2) : '0.00'}%</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    // Watchlist & Z-Scores
                    let watchHTML = '';
                    if (botStatus && botStatus.z_scores) {
                        const sortedAssets = Object.keys(botStatus.z_scores).sort();
                        sortedAssets.forEach(asset => {
                            const data = botStatus.z_scores[asset];
                            const z = data.val;
                            const t1h = data.trend_1h === "UP" ? "▲" : "▼";
                            const t4h = data.trend_4h === "UP" ? "▲" : "▼";
                            const hotClass = z >= 2.0 ? 'hot-short' : (z <= -2.0 ? 'hot-long' : '');
                            const name = asset.replace('xyz:', '');
                            
                            watchHTML += `
                                <div class="watch-item">
                                    <span class="watch-name">${name}</span>
                                    <span class="watch-z ${hotClass}">${z >= 0 ? '+' : ''}${z.toFixed(1)}</span>
                                    <span class="trend-icon" style="color:${data.trend_1h==='UP'?'var(--green)':'var(--red)'}">${t1h}</span>
                                    <span class="trend-icon" style="color:${data.trend_4h==='UP'?'var(--green)':'var(--red)'}">${t4h}</span>
                                </div>
                            `;
                        });
                    }

                    html += `
                        <div class="card ${acc.class}">
                            <span class="acc-type">${acc.name}</span>
                            <div class="equity">${totalEquity.toFixed(2)} <span class="currency">USDC</span></div>
                            <div class="grid">
                                <div class="stat-box"><div class="stat-label">Daily PnL</div><div class="val ${botStatus?.daily_stats?.pnl_usdc >= 0 ? 'up' : 'down'}">$${(botStatus?.daily_stats?.pnl_usdc || 0).toFixed(2)}</div></div>
                                <div class="stat-box"><div class="stat-label">7D PnL</div><div class="val ${botStatus?.daily_stats?.weekly_pnl >= 0 ? 'up' : 'down'}">$${(botStatus?.daily_stats?.weekly_pnl || 0).toFixed(2)}</div></div>
                                <div class="stat-box"><div class="stat-label">30D PnL</div><div class="val ${botStatus?.daily_stats?.monthly_pnl >= 0 ? 'up' : 'down'}">$${(botStatus?.daily_stats?.monthly_pnl || 0).toFixed(2)}</div></div>
                                <div class="stat-box"><div class="stat-label">Margin Used</div><div class="val">${marginUsed.toFixed(1)}</div></div>
                            </div>
                            <div class="section-header"><h2>Live Positions (${allPositions.length})</h2></div>
                            <div class="pos-list">${posHTML}</div>
                            <div class="section-header"><h2>Kings Watchlist & Z-Scores</h2></div>
                            <div class="watchlist">${watchHTML || '<div class="empty">Waiting for Bot Sync...</div>'}</div>
                        </div>
                    `;
                }

                dashboardEl.innerHTML = html;
                statusEl.innerText = `Live Sync: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                statusEl.innerText = "Connection Refused";
            }
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
