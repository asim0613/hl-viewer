<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #14181f;
            --accent-cyan: #00f2ff;
            --accent-purple: #bc00ff;
            --green: #00ffa3;
            --red: #ff3b69;
            --text: #e0e0e0;
            --subtext: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--subtext);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }
        .acc-type {
            font-size: 14px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
        .equity {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .equity .currency {
            font-size: 14px;
            color: var(--subtext);
            font-weight: 400;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
        }
        .stat-label {
            font-size: 12px;
            color: var(--subtext);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .stat-box .val {
            font-size: 18px;
            font-weight: 600;
        }
        .val.up { color: var(--green); }
        .val.down { color: var(--red); }

        .section-header {
            margin: 30px 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .section-header h2 {
            font-size: 16px;
            font-weight: 400;
            color: var(--subtext);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pos-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .pos-card {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #333;
            transition: transform 0.2s;
        }
        .pos-card.long { border-left-color: var(--green); }
        .pos-card.short { border-left-color: var(--red); }
        .pos-card:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.04);
        }
        .pos-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coin-meta h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .side-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        .side-long { color: var(--green); background: rgba(0, 255, 163, 0.1); }
        .side-short { color: var(--red); background: rgba(255, 59, 105, 0.1); }
        
        .price-row {
            margin-top: 5px;
            font-size: 13px;
        }
        .p-label { color: var(--subtext); }
        .p-val { color: var(--text); margin-right: 10px; }

        .pos-pnl { text-align: right; }
        .pnl-amt { font-size: 20px; font-weight: 600; }
        .pnl-pct { font-size: 14px; margin-top: 2px; }
        .up { color: var(--green); }
        .down { color: var(--red); }

        .watchlist {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .watch-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .watch-name {
            font-size: 12px;
            color: var(--subtext);
            display: block;
            margin-bottom: 5px;
        }
        .watch-z {
            font-size: 14px;
            font-weight: 600;
        }
        .hot-short { color: var(--red); }
        .hot-long { color: var(--green); }
        .trend-icon { font-size: 10px; margin-left: 4px; }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--subtext);
            font-style: italic;
        }

        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Kings Terminal <span style="font-size: 12px; font-weight: 300; opacity: 0.7; margin-left: 10px;">LIVE ENGINE STATUS</span></div>
        <div id="status" class="status-badge">Syncing...</div>
    </header>

    <div id="dashboard" class="dashboard">
        <!-- Dashboard cards will be injected here -->
    </div>

    <script>
        const ACCOUNTS = [
            { id: "main", name: "Kings Unified Engine", address: "0x82C23290b1797a32D1C4510C233f7d6F8E944896", class: "master" }
        ];

        async function getData(url) {
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (e) { return null; }
        }

        async function postData(url, data) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await res.json();
            } catch (e) { return null; }
        }

        async function updateDashboard() {
            const dashboardEl = document.getElementById('dashboard');
            const statusEl = document.getElementById('status');

            try {
                let html = '';
                for (const acc of ACCOUNTS) {
                    const [perp, perpXyz, spot, botStatus] = await Promise.all([
                        postData('https://api.hyperliquid.xyz/info', { type: "clearinghouseState", user: acc.address }),
                        postData('https://api.hyperliquid.xyz/info', { type: "clearinghouseState", user: acc.address, dex: "xyz" }),
                        postData('https://api.hyperliquid.xyz/info', { type: "spotClearinghouseState", user: acc.address }),
                        getData(`status_${acc.id}.json?t=${new Date().getTime()}`)
                    ]);

                    if (!perp && !perpXyz) continue;

                    const accountValue = parseFloat(perp?.marginSummary?.accountValue || 0);
                    const usdc = (spot?.balances || []).find(b => b.coin === 'USDC');
                    const spotUSDC = parseFloat(usdc?.total || 0);
                    const totalEquity = Math.max(accountValue, spotUSDC);
                    const marginUsed = parseFloat(perp?.marginSummary?.totalMarginUsed || 0) + 
                                     parseFloat(perpXyz?.marginSummary?.totalMarginUsed || 0);

                    // Positions
                    const allPositions = [...(perp?.assetPositions || []), ...(perpXyz?.assetPositions || [])]
                        .map(p => p.position)
                        .filter(p => Math.abs(parseFloat(p.szi)) > 0.0001);

                    let posHTML = '';
                    if (allPositions.length === 0) {
                        posHTML = '<div class="empty">Scanning for Opportunities...</div>';
                    } else {
                        allPositions.forEach(pos => {
                            const coinRaw = pos.coin;
                            const coin = pos.coin.replace('xyz:', '');
                            const szi = parseFloat(pos.szi);
                            
                            const bPos = (botStatus?.active_positions || {})[coinRaw] || {};
                            const pnl = bPos.pnl_usd !== undefined ? bPos.pnl_usd : parseFloat(pos.unrealizedPnl || 0);
                            const roe = bPos.roe !== undefined ? bPos.roe : 0;
                            
                            const side = szi > 0 ? "LONG" : "SHORT";
                            const pnlClass = (roe >= 0 || pnl >= 0) ? "up" : "down";
                            const entryP = bPos.entry_p || parseFloat(pos.entryPx || 0);
                            const currP = bPos.curr_p || 0;
                            const tpP = bPos.tp_p || 0;
                            const trailExitP = bPos.trail_exit_p || 0;
                            const hwm = bPos.hwm || 0;
                            const tStart = bPos.trail_start || 0.3;

                            posHTML += `
                                <div class="pos-card ${szi > 0 ? 'long' : 'short'}">
                                    <div class="pos-main">
                                        <div class="coin-meta">
                                            <h3>${coin} <span class="side-badge ${szi > 0 ? 'side-long' : 'side-short'}">${side}</span></h3>
                                            <div class="price-row">
                                                <span class="p-label">Entry:</span> <span class="p-val">$${entryP.toFixed(4)}</span>
                                                ${currP ? `<span class="p-label">Now:</span> <span class="p-val">$${currP.toFixed(4)}</span>` : ''}
                                            </div>
                                            <div class="price-row">
                                                <span class="p-label">Target:</span> <span class="p-val" style="color:var(--accent-cyan)">$${tpP.toFixed(4)}</span>
                                                <span class="p-label" style="margin-left:10px">Stop:</span> <span class="p-val" style="color:var(--red)">$${(bPos.sl_p || 0).toFixed(4)}</span>
                                            </div>
                                            ${hwm >= tStart ? `
                                                <div class="price-row trail-active" style="background: rgba(0, 242, 255, 0.05); padding: 2px 6px; border-radius: 4px; margin-top: 4px;">
                                                    <span class="p-label">🛡️ Trail Exit:</span> <span class="p-val">$${trailExitP.toFixed(4)}</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div class="pos-pnl">
                                            <div class="pnl-amt ${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</div>
                                            <div class="pnl-pct ${pnlClass}">${roe.toFixed(2)}%</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    // Watchlist & Z-Scores
                    let watchHTML = '';
                    if (botStatus && botStatus.z_scores) {
                        const sortedAssets = Object.keys(botStatus.z_scores).sort();
                        sortedAssets.forEach(asset => {
                            const data = botStatus.z_scores[asset];
                            const z = data.val;
                            const t1h = data.trend_1h === "UP" ? "▲" : "▼";
                            const t4h = data.trend_4h === "UP" ? "▲" : "▼";
                            const hotClass = z >= 2.0 ? 'hot-short' : (z <= -2.0 ? 'hot-long' : '');
                            const name = asset.replace('xyz:', '');
                            
                            watchHTML += `
                                <div class="watch-item">
                                    <span class="watch-name">${name}</span>
                                    <span class="watch-z ${hotClass}">${z >= 0 ? '+' : ''}${z.toFixed(1)}</span>
                                    <span class="trend-icon" style="color:${data.trend_1h==='UP'?'var(--green)':'var(--red)'}">${t1h}</span>
                                    <span class="trend-icon" style="color:${data.trend_4h==='UP'?'var(--green)':'var(--red)'}">${t4h}</span>
                                </div>
                            `;
                        });
                    }

                    html += `
                        <div class="card ${acc.class}">
                            <span class="acc-type">${acc.name}</span>
                            <div class="equity">${totalEquity.toFixed(2)} <span class="currency">USDC</span></div>
                            <div class="grid">
                                <div class="stat-box"><div class="stat-label">Daily PnL</div><div class="val ${botStatus?.daily_stats?.pnl_usdc >= 0 ? 'up' : 'down'}">$${(botStatus?.daily_stats?.pnl_usdc || 0).toFixed(2)}</div></div>
                                <div class="stat-box"><div class="stat-label">7D PnL</div><div class="val ${botStatus?.daily_stats?.weekly_pnl >= 0 ? 'up' : 'down'}">$${(botStatus?.daily_stats?.weekly_pnl || 0).toFixed(2)}</div></div>
                                <div class="stat-box"><div class="stat-label">Margin Used</div><div class="val">${marginUsed.toFixed(1)}</div></div>
                            </div>
                            <div class="section-header"><h2>Live Positions (${allPositions.length})</h2></div>
                            <div class="pos-list">${posHTML}</div>
                            <div class="section-header"><h2>Kings Watchlist & Z-Scores</h2></div>
                            <div class="watchlist">${watchHTML || '<div class="empty">Waiting for Bot Sync...</div>'}</div>
                        </div>
                    `;
                }

                dashboardEl.innerHTML = html;
                statusEl.innerText = `Live Sync: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                statusEl.innerText = "Connection Refused";
            }
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
